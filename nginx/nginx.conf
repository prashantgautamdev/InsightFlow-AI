# Reverse proxy in front of the frontend (static) and backend (API) containers.
# Use this if you want a single entrypoint (port 80) routing /api to FastAPI
# and everything else to the React app, instead of exposing both services directly.

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 30M;

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
